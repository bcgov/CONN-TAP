name: app-deploy-dev

# Deploys dev to EKS with Helm after app-build has pushed images for the build SHA.
# Frontend is exposed on the LZA internal ALB at:
#   https://tap.<license>-dev.stratus.cloud.gov.bc.ca
#
# Prerequisites (Terraform in infra/envs/dev — alb_controller.tf):
#   Apply the AWS Load Balancer Controller and bcgovhealthcheck Ingress before
#   the first app deploy. On a new cluster, use a targeted apply if needed:
#     terraform apply -target=module.eks -target=module.eks_alb_controller_identity
#     terraform apply
#
# ALB subnets, certificate ARN, and ingress group are read from the Terraform-
# managed bcgovhealthcheck Ingress in kube-system (not from GitHub variables).
#
# Required GitHub Environment configuration for dev:
#   Secrets: AWS_DEPLOY_ROLE_ARN, KEYCLOAK_CLIENT_SECRET, SESSION_SECRET,
#            TOKEN_ENCRYPTION_KEY
#   Variables: LICENSE_PLATE
#   Optional variables: CORS_ORIGINS, KEYCLOAK_ISSUER_URL, KEYCLOAK_CLIENT_ID,
#                       SESSION_COOKIE_NAME
#
# TEMP: PR deploy — (1) workflow_run after app-build on any branch; (2) pull_request
#       so this workflow file from the PR branch is used (workflow_run always runs
#       the default-branch copy). Revert before merge: workflow_run branches: [main],
#       remove pull_request, revert app-build pr-build tagging.
on:
  workflow_run:
    workflows:
      - app-build
    types:
      - completed
  pull_request:
    branches:
      - main
    paths:
      - "app/**"
      - "helm/**"
      - ".github/workflows/app-build.yaml"
      - ".github/workflows/app-deploy-dev.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: app-deploy-dev-${{ github.event.pull_request.number || github.event.workflow_run.head_branch || 'main' }}
  cancel-in-progress: false

env:
  AWS_REGION: ca-central-1
  ENV_NAME: dev
  HELM_RELEASE: conn-tap
  HELM_NAMESPACE: conn-tap
  CHART_PATH: helm/conn-tap
  BUILD_RUN_ID: ${{ github.event.workflow_run.id || github.run_id }}

jobs:
  deploy:
    name: Deploy dev
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    environment: dev

    env:
      LICENSE_PLATE: ${{ vars.LICENSE_PLATE }}
      CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}
      KEYCLOAK_ISSUER_URL: ${{ vars.KEYCLOAK_ISSUER_URL }}
      KEYCLOAK_CLIENT_ID: ${{ vars.KEYCLOAK_CLIENT_ID }}
      KEYCLOAK_CLIENT_SECRET: ${{ secrets.KEYCLOAK_CLIENT_SECRET }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      SESSION_COOKIE_NAME: ${{ vars.SESSION_COOKIE_NAME }}
      TOKEN_ENCRYPTION_KEY: ${{ secrets.TOKEN_ENCRYPTION_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.event.workflow_run.head_sha || github.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: gha-app-dev-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve AWS and image settings
        id: settings
        run: |
          : "${LICENSE_PLATE:?Set the dev environment variable LICENSE_PLATE.}"

          if [ "${GITHUB_EVENT_NAME}" = "workflow_run" ]; then
            image_tag="${{ github.event.workflow_run.head_sha }}"
          elif [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            image_tag="${{ github.event.pull_request.head.sha }}"
          else
            image_tag="${GITHUB_SHA}"
          fi
          echo "IMAGE_TAG=${image_tag}" >> "${GITHUB_ENV}"

          aws_account_id="$(aws sts get-caller-identity --query Account --output text)"
          registry="${aws_account_id}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          backend_repository="${LICENSE_PLATE}-${ENV_NAME}-app-backend"
          frontend_repository="${LICENSE_PLATE}-${ENV_NAME}-app-frontend"

          aws ecr describe-repositories --repository-names "${backend_repository}" "${frontend_repository}" >/dev/null

          wait_for_image_tag() {
            local repository="$1"
            local attempt
            for attempt in $(seq 1 40); do
              if aws ecr describe-images \
                --repository-name "${repository}" \
                --image-ids "imageTag=${IMAGE_TAG}" >/dev/null 2>&1; then
                return 0
              fi
              echo "Waiting for ${repository}:${IMAGE_TAG} (attempt ${attempt}/40, app-build may still be running)..."
              sleep 15
            done
            echo "::error::Image ${repository}:${IMAGE_TAG} not found in ECR."
            return 1
          }
          wait_for_image_tag "${backend_repository}"
          wait_for_image_tag "${frontend_repository}"

          ingress_host="tap.${LICENSE_PLATE}-${ENV_NAME}.stratus.cloud.gov.bc.ca"
          app_base_url="https://${ingress_host}"

          {
            echo "AWS_ACCOUNT_ID=${aws_account_id}"
            echo "ECR_REGISTRY=${registry}"
            echo "BACKEND_IMAGE_URI=${registry}/${backend_repository}"
            echo "FRONTEND_IMAGE_URI=${registry}/${frontend_repository}"
            echo "EKS_CLUSTER_NAME=${LICENSE_PLATE}-${ENV_NAME}-eks"
            echo "POSTGRES_SECRET_ID=${LICENSE_PLATE}-${ENV_NAME}/rds-master"
            echo "POSTGRES_DB_INSTANCE_ID=${LICENSE_PLATE}-${ENV_NAME}"
            echo "APP_BASE_URL=${app_base_url}"
            echo "INGRESS_HOST=${ingress_host}"
          } >> "${GITHUB_ENV}"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Verify ALB controller and load ingress config
        run: |
          aws eks update-kubeconfig \
            --region "${AWS_REGION}" \
            --name "${EKS_CLUSTER_NAME}"

          if ! kubectl wait --for=condition=available \
            deployment/aws-load-balancer-controller \
            -n kube-system \
            --timeout=120s 2>/dev/null; then
            echo "::error::AWS Load Balancer Controller is not ready in kube-system."
            echo "Apply Terraform first (infra/envs/dev/alb_controller.tf):"
            echo "  terraform apply -target=module.eks -target=module.eks_alb_controller_identity"
            echo "  terraform apply"
            exit 1
          fi

          if ! kubectl get ingress bcgovhealthcheck -n kube-system >/dev/null 2>&1; then
            echo "::error::bcgovhealthcheck Ingress not found in kube-system."
            echo "Run a full Terraform apply so alb_controller.tf creates the shared internal ALB group."
            exit 1
          fi

          alb_ann="$(kubectl get ingress bcgovhealthcheck -n kube-system -o json \
            | jq -r '.metadata.annotations')"
          web_subnet_ids="$(echo "${alb_ann}" | jq -r '."alb.ingress.kubernetes.io/subnets" // empty')"
          alb_certificate_arn="$(echo "${alb_ann}" | jq -r '."alb.ingress.kubernetes.io/certificate-arn" // empty')"
          ingress_group="$(echo "${alb_ann}" | jq -r '."alb.ingress.kubernetes.io/group.name" // empty')"

          if [ -z "${web_subnet_ids}" ] || [ -z "${alb_certificate_arn}" ] || [ -z "${ingress_group}" ]; then
            echo "::error::bcgovhealthcheck Ingress is missing required ALB annotations."
            echo "Expected: subnets, certificate-arn, group.name (from Terraform alb_controller.tf)."
            kubectl get ingress bcgovhealthcheck -n kube-system -o yaml
            exit 1
          fi

          {
            echo "WEB_SUBNET_IDS=${web_subnet_ids}"
            echo "ALB_CERTIFICATE_ARN=${alb_certificate_arn}"
            echo "INGRESS_GROUP=${ingress_group}"
          } >> "${GITHUB_ENV}"

      - name: Deploy with Helm
        run: |
          set +x

          : "${KEYCLOAK_CLIENT_SECRET:?Set the dev environment secret KEYCLOAK_CLIENT_SECRET.}"
          : "${SESSION_SECRET:?Set the dev environment secret SESSION_SECRET.}"
          : "${TOKEN_ENCRYPTION_KEY:?Set the dev environment secret TOKEN_ENCRYPTION_KEY.}"

          keycloak_issuer_url="${KEYCLOAK_ISSUER_URL:-https://dev.loginproxy.gov.bc.ca/auth/realms/standard}"
          keycloak_client_id="${KEYCLOAK_CLIENT_ID:-conn-hub-6434}"
          session_cookie_name="${SESSION_COOKIE_NAME:-telecom_session}"
          cors_origins="${CORS_ORIGINS:-[\"${APP_BASE_URL}\"]}"

          postgres_host="$(aws rds describe-db-instances \
            --db-instance-identifier "${POSTGRES_DB_INSTANCE_ID}" \
            --query "DBInstances[0].Endpoint.Address" \
            --output text)"
          postgres_password="$(aws secretsmanager get-secret-value \
            --secret-id "${POSTGRES_SECRET_ID}" \
            --query SecretString \
            --output text)"

          aws eks update-kubeconfig \
            --region "${AWS_REGION}" \
            --name "${EKS_CLUSTER_NAME}"

          kubectl create namespace "${HELM_NAMESPACE}" \
            --dry-run=client \
            -o yaml | kubectl apply -f -

          backend_secret="${HELM_RELEASE}-backend-runtime"
          frontend_secret="${HELM_RELEASE}-frontend-runtime"

          kubectl create secret generic "${backend_secret}" \
            --namespace "${HELM_NAMESPACE}" \
            --from-literal=POSTGRES_PASSWORD="${postgres_password}" \
            --from-literal=SESSION_SECRET="${SESSION_SECRET}" \
            --dry-run=client \
            -o yaml | kubectl apply -f -

          kubectl create secret generic "${frontend_secret}" \
            --namespace "${HELM_NAMESPACE}" \
            --from-literal=POSTGRES_PASSWORD="${postgres_password}" \
            --from-literal=KEYCLOAK_CLIENT_SECRET="${KEYCLOAK_CLIENT_SECRET}" \
            --from-literal=SESSION_SECRET="${SESSION_SECRET}" \
            --from-literal=TOKEN_ENCRYPTION_KEY="${TOKEN_ENCRYPTION_KEY}" \
            --dry-run=client \
            -o yaml | kubectl apply -f -

          ingress_annotations="$(jq -nc \
            --arg subnets "${WEB_SUBNET_IDS}" \
            --arg cert "${ALB_CERTIFICATE_ARN}" \
            --arg group "${INGRESS_GROUP}" \
            '{
              "alb.ingress.kubernetes.io/scheme": "internal",
              "alb.ingress.kubernetes.io/target-type": "ip",
              "alb.ingress.kubernetes.io/subnets": $subnets,
              "alb.ingress.kubernetes.io/certificate-arn": $cert,
              "alb.ingress.kubernetes.io/group.name": $group,
              "alb.ingress.kubernetes.io/tags": "Public=True",
              "alb.ingress.kubernetes.io/listen-ports": "[{\"HTTPS\":443}]"
            }')"
          : "${ingress_annotations:?Failed to build ingress annotations JSON.}"

          helm upgrade --install "${HELM_RELEASE}" "${CHART_PATH}" \
            --namespace "${HELM_NAMESPACE}" \
            --create-namespace \
            --wait \
            --timeout 10m \
            --set-string backend.image.repository="${BACKEND_IMAGE_URI}" \
            --set-string backend.image.tag="${IMAGE_TAG}" \
            --set-string backend.image.pullPolicy="Always" \
            --set-string 'backend.podAnnotations.conn-tap\.github\.com/build-sha'="${IMAGE_TAG}" \
            --set-string 'backend.podAnnotations.conn-tap\.github\.com/build-run-id'="${BUILD_RUN_ID}" \
            --set-string backend.env.POSTGRES_HOST="${postgres_host}" \
            --set-string backend.env.POSTGRES_PORT="5432" \
            --set-string backend.env.POSTGRES_USER="dbadmin" \
            --set-string backend.env.POSTGRES_DB="app" \
            --set-string backend.env.CORS_ORIGINS="${cors_origins}" \
            --set-string backend.env.KEYCLOAK_ISSUER_URL="${keycloak_issuer_url}" \
            --set-string backend.env.KEYCLOAK_CLIENT_ID="${keycloak_client_id}" \
            --set-string backend.env.SESSION_COOKIE_NAME="${session_cookie_name}" \
            --set-string backend.existingSecret="${backend_secret}" \
            --set-string frontend.image.repository="${FRONTEND_IMAGE_URI}" \
            --set-string frontend.image.tag="${IMAGE_TAG}" \
            --set-string frontend.image.pullPolicy="Always" \
            --set-string 'frontend.podAnnotations.conn-tap\.github\.com/build-sha'="${IMAGE_TAG}" \
            --set-string 'frontend.podAnnotations.conn-tap\.github\.com/build-run-id'="${BUILD_RUN_ID}" \
            --set-string frontend.env.APP_BASE_URL="${APP_BASE_URL}" \
            --set-string frontend.env.BACKEND_INTERNAL_URL="http://${HELM_RELEASE}-backend:8000" \
            --set-string frontend.env.POSTGRES_HOST="${postgres_host}" \
            --set-string frontend.env.POSTGRES_PORT="5432" \
            --set-string frontend.env.POSTGRES_USER="dbadmin" \
            --set-string frontend.env.POSTGRES_DB="app" \
            --set-string frontend.env.KEYCLOAK_ISSUER_URL="${keycloak_issuer_url}" \
            --set-string frontend.env.KEYCLOAK_CLIENT_ID="${keycloak_client_id}" \
            --set-string frontend.env.SESSION_COOKIE_NAME="${session_cookie_name}" \
            --set-string frontend.existingSecret="${frontend_secret}" \
            --set ingress.enabled=true \
            --set ingress.className=alb \
            --set-string ingress.host="${INGRESS_HOST}" \
            --set-json ingress.annotations="${ingress_annotations}"
