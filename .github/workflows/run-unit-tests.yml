name: run-unit-tests

permissions:
  contents: read

on:
  workflow_call:

concurrency:
  group: run-unit-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

jobs:
  backend:
    name: Run backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest pytest-cov

      - name: Run backend tests
        env:
          PYTHONPATH: app/backend
        run: |
          mkdir -p reports
          pytest app/backend/tests \
            --cov=app/backend/app \
            --cov-config=.coveragerc \
            --junitxml=reports/backend-test-results.xml \
            --cov-report=xml:reports/backend-coverage.xml

      - name: Upload backend test reports
        uses: actions/upload-artifact@v4
        with:
          name: sonar-reports-backend
          path: reports/
          if-no-files-found: error

  frontend-unit:
    name: Run frontend unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: app/frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: app/frontend
        run: pnpm install --frozen-lockfile

      - name: Run frontend unit tests
        working-directory: app/frontend
        run: pnpm test:coverage

      - name: Stage frontend coverage report
        run: |
          mkdir -p reports
          sed 's|^SF:src/|SF:app/frontend/src/|g' app/frontend/coverage/lcov.info > reports/frontend-lcov.info

      - name: Upload frontend test reports
        uses: actions/upload-artifact@v4
        with:
          name: sonar-reports-frontend
          path: reports/
          if-no-files-found: error

  sonarcloud:
    name: SonarCloud scan
    runs-on: ubuntu-latest
    needs: [backend, frontend-unit]
    permissions:
      contents: read
      actions: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download backend test reports
        uses: actions/download-artifact@v4
        with:
          name: sonar-reports-backend
          path: reports

      - name: Download frontend test reports
        uses: actions/download-artifact@v4
        with:
          name: sonar-reports-frontend
          path: reports

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v5.1.0
        with:
          projectBaseDir: .
          args: >
            -Dsonar.sources=app/backend/app,app/backend/alembic,app/frontend/src
            -Dsonar.inclusions=**/*.py,**/*.ts,**/*.tsx
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
