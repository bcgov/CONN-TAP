name: main

permissions:
  contents: read

on:
  workflow_call:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  check-conventional-commits:
    permissions:
      contents: read
      security-events: write
    uses: ./.github/workflows/check-conventional-commits.yml

  run-unit-tests:
    permissions:
      contents: read
      actions: read
      id-token: write
    uses: ./.github/workflows/run-unit-tests.yml
    secrets: inherit

  run-e2e-tests:
    permissions:
      contents: read
    uses: ./.github/workflows/run-e2e-tests.yml
    secrets: inherit
