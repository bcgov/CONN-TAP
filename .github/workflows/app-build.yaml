name: app-build

# Pull requests build both app images and push untagged digest-only images to
# the dev ECR repos. Main pushes the built images to the dev ECR repos with both
# the mutable dev tag and the git SHA tag. Test/prod promotion will use versioned
# tags once the release versioning strategy is finalized.
#
# Required GitHub Environment configuration for push jobs:
#   Secrets: AWS_DEPLOY_ROLE_ARN
#   Variables: LICENSE_PLATE

on:
  pull_request:
    branches:
      - main
    paths:
      - "app/backend/**"
      - "app/frontend/**"
      - ".github/workflows/app-build.yaml"
  push:
    branches:
      - main
    paths:
      - "app/backend/**"
      - "app/frontend/**"
      - "helm/**"
      - ".github/workflows/app-build.yaml"
      - ".github/workflows/app-deploy-dev.yml"

permissions:
  contents: read
  id-token: write

concurrency:
  group: app-build-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ca-central-1
  IMAGE_TAG: dev
  TARGET_ENV: dev

jobs:
  pr-build:
    name: Build and push untagged dev images
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: dev

    env:
      LICENSE_PLATE: ${{ vars.LICENSE_PLATE }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: gha-app-pr-build-${{ env.TARGET_ENV }}-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ECR image settings
        id: settings
        run: |
          : "${LICENSE_PLATE:?Set the ${TARGET_ENV} environment variable LICENSE_PLATE.}"

          aws_account_id="$(aws sts get-caller-identity --query Account --output text)"
          registry="${aws_account_id}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          backend_repository="${LICENSE_PLATE}-${TARGET_ENV}-app-backend"
          frontend_repository="${LICENSE_PLATE}-${TARGET_ENV}-app-frontend"

          aws ecr describe-repositories --repository-names "${backend_repository}" "${frontend_repository}" >/dev/null

          {
            echo "backend_image_uri=${registry}/${backend_repository}"
            echo "frontend_image_uri=${registry}/${frontend_repository}"
          } >> "${GITHUB_OUTPUT}"

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push untagged backend image
        uses: docker/build-push-action@v6
        with:
          context: app/backend
          file: app/backend/Dockerfile
          outputs: type=image,name=${{ steps.settings.outputs.backend_image_uri }},push-by-digest=true,name-canonical=true,push=true

      - name: Build and push untagged frontend image
        uses: docker/build-push-action@v6
        with:
          context: app/frontend
          file: app/frontend/Dockerfile
          outputs: type=image,name=${{ steps.settings.outputs.frontend_image_uri }},push-by-digest=true,name-canonical=true,push=true

  build-push-dev:
    name: Build and push dev images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: dev

    env:
      LICENSE_PLATE: ${{ vars.LICENSE_PLATE }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: gha-app-build-${{ env.TARGET_ENV }}-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ECR image settings
        id: settings
        run: |
          : "${LICENSE_PLATE:?Set the ${TARGET_ENV} environment variable LICENSE_PLATE.}"

          aws_account_id="$(aws sts get-caller-identity --query Account --output text)"
          registry="${aws_account_id}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          backend_repository="${LICENSE_PLATE}-${TARGET_ENV}-app-backend"
          frontend_repository="${LICENSE_PLATE}-${TARGET_ENV}-app-frontend"

          aws ecr describe-repositories --repository-names "${backend_repository}" "${frontend_repository}" >/dev/null

          {
            echo "backend_image_uri=${registry}/${backend_repository}"
            echo "frontend_image_uri=${registry}/${frontend_repository}"
          } >> "${GITHUB_OUTPUT}"

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: app/backend
          file: app/backend/Dockerfile
          push: true
          tags: |
            ${{ steps.settings.outputs.backend_image_uri }}:${{ env.IMAGE_TAG }}
            ${{ steps.settings.outputs.backend_image_uri }}:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: app/frontend
          file: app/frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.settings.outputs.frontend_image_uri }}:${{ env.IMAGE_TAG }}
            ${{ steps.settings.outputs.frontend_image_uri }}:${{ github.sha }}
