name: check conventional commits

permissions:
  contents: read

on:
  workflow_call:

jobs:
  cocogitto:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Conventional commits check
        if: github.event_name != 'pull_request'
        uses: cocogitto/cocogitto-action@v4
        with:
          command: check
          args: --from-latest-tag

      - name: Conventional commits check pull requests
        if: github.event_name == 'pull_request'
        uses: cocogitto/cocogitto-action@v4
        with:
          command: check
          args: ${{ github.event.pull_request.base.sha }}..${{ github.sha }}

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: ./.bin/install-gitleaks-linux-x64.sh
      - run: ./gitleaks detect --exit-code 0 --report-format sarif --report-path "gitleaks.sarif"
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "gitleaks.sarif"
