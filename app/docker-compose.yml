name: app

# Auth and Keycloak settings are loaded from frontend env files (when present):
#   1. frontend/.env.local.example — committed local defaults
#   2. frontend/.env.local — optional developer overrides (copy from .env.local.example)
# Docker-specific values below override host-oriented settings from those files
# (e.g. POSTGRES_HOST=postgres, BACKEND_INTERNAL_URL=http://backend:8000).

services:
  postgres:
    build:
      context: ./db
      dockerfile: Dockerfile
    image: app-postgres:16
    container_name: app-postgres
    command: >
      postgres
      -c shared_preload_libraries=pg_partman_bgw
      -c pg_partman_bgw.interval=3600
      -c pg_partman_bgw.role=app
      -c pg_partman_bgw.dbname=app
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - app-pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: app-backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./frontend/.env.local.example
      - path: ./frontend/.env.local
        required: false
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
      POSTGRES_SSL: "false"
      CORS_ORIGINS: '["http://localhost:3001"]'
      WATCHFILES_FORCE_POLLING: "true"
      WATCHFILES_POLL_DELAY_MS: "300"
    ports:
      - "8000:8000"
    # Mount source for hot-reload during local development.
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app

  frontend:
    profiles:
      - frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: app-frontend
    depends_on:
      - backend
    env_file:
      - ./frontend/.env.local.example
      - path: ./frontend/.env.local
        required: false
    environment:
      APP_BASE_URL: http://localhost:3001
      BACKEND_INTERNAL_URL: http://backend:8000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
      POSTGRES_SSL: "false"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3001:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: pnpm dev

volumes:
  app-pgdata:
