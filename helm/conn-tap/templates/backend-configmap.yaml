apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "conn-tap.backendName" . }}
  labels:
    {{- include "conn-tap.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  {{- if .Values.migrate.enabled }}
  annotations:
    # Created before db-migrate hook (weight -5) so envFrom configMapRef resolves on first install.
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
  {{- end }}
data:
  {{- range $key, $value := .Values.backend.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
