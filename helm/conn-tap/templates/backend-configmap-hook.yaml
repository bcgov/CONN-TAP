{{- if .Values.migrate.enabled }}
# Pre-install/pre-upgrade copy so the db-migrate hook can envFrom this ConfigMap before
# the main release manifest is applied (first install). The regular backend-configmap
# template keeps the same object in the release for conn-tap-backend Deployment.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "conn-tap.backendName" . }}
  labels:
    {{- include "conn-tap.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
data:
  {{- include "conn-tap.backendConfigMapData" . | nindent 2 }}
{{- end }}
