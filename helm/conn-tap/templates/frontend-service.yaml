apiVersion: v1
kind: Service
metadata:
  name: {{ include "conn-tap.frontendName" . }}
  labels:
    {{- include "conn-tap.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "conn-tap.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
