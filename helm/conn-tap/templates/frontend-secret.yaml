{{- if and (not .Values.frontend.existingSecret) .Values.frontend.secretEnv }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "conn-tap.frontendName" . }}
  labels:
    {{- include "conn-tap.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
type: Opaque
stringData:
  {{- range $key, $value := .Values.frontend.secretEnv }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
