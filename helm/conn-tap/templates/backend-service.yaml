apiVersion: v1
kind: Service
metadata:
  name: {{ include "conn-tap.backendName" . }}
  labels:
    {{- include "conn-tap.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "conn-tap.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
